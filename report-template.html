<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gnothology Blueprint Report</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; padding: 20px; }
        .slide { display: none; height: 80vh; border: 1px solid #333; padding: 20px; box-sizing: border-box; }
        .slide.active { display: flex; flex-direction: column; justify-content: center; }
        .controls { margin-top: 15px; display: flex; gap: 10px; }
        button { background: #111; color: #0f0; border: 1px solid #0f0; padding: 5px 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="slide-1" class="slide active">
        <h2>Slide 1: Core System Initialization</h2>
        <p id="user-greeting">Loading telemetry payload...</p>
    </div>

    <div id="slide-2" class="slide">
        <h2>Slide 2: Radical Blueprint Vector</h2>
        <div id="radical-val" style="font-size: 2rem; font-weight: bold;">--</div>
    </div>

    <div class="controls">
        <button onclick="prevSlide()">Previous</button>
        <button onclick="nextSlide()">Next</button>
        <button onclick="shareReport()">Share Report</button>
    </div>

    <script>
        let currentSlide = 1;
        const totalSlides = 9;

        // Simple slide navigation logic
        function showSlide(n) {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(`slide-${n}`);
            if(target) target.classList.add('active');
        }

        function nextSlide() { if(currentSlide < totalSlides) showSlide(++currentSlide); }
        function prevSlide() { if(currentSlide > 1) showSlide(--currentSlide); }

        // Native Web Share API implementation
        async function shareReport() {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'My Gnothology Blueprint',
                        text: 'Check out my 9-slide numeric matrix narrative.',
                        url: window.location.href
                    });
                } catch (err) {
                    console.log('Share failed or canceled');
                }
            } else {
                alert('Sharing link: ' + window.location.href);
            }
        }
    </script>
</body>
</html>
