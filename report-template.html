<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLATH // System Core Telemetry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --orange: #FF3300;
            --black: #000000;
            --dark: #0A0A0A;
            --grey: #121212;
            --border: #222222;
            --text: #FFFFFF;
            --dim: #666666;
            --font: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--black);
            color: var(--text);
            font-family: var(--font);
            line-height: 1.6;
        }

        /* Generative Background Matrix Grid Mesh Background */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.15;
            pointer-events: none;
            z-index: 1;
        }

        .story-container {
            width: 100%;
            max-width: 100vw;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .story-card {
            width: 100%;
            max-width: 480px;
            min-height: 92vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid var(--border);
            background-color: var(--dark);
            margin: 25px 0;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            position: relative;
        }

        /* Responsive Desktop Framework Layout: Removes the box cage to let items flow edge-to-edge horizontally */
        @media (min-width: 1024px) {
            .story-container {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 25px;
                padding: 50px;
            }
            .story-card {
                width: calc(33.33% - 25px);
                max-width: 420px;
                min-height: 85vh;
                margin: 0;
            }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--dim);
            letter-spacing: 1px;
            border-bottom: 1px dashed var(--border);
            padding-bottom: 15px;
            text-transform: uppercase;
        }
        .card-header .step-idx { color: var(--orange); font-weight: 600; }

        .card-body {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 25px 0;
        }

        .card-footer {
            border-top: 1px dashed var(--border);
            padding-top: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--dim);
        }

        h1 { font-size: 1.8rem; font-weight: 800; text-transform: uppercase; line-height: 1.1; letter-spacing: -1px; }
        h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--orange); margin-bottom: 12px; }
