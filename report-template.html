<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLATH // Telemetry Finalized</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <meta property="og:title" content="PLATH // Engine Matrix Finalized">
    <meta property="og:description" content="Telemetry output confirmed for profile {{{matrixId}}}. Access your structural system profile alignment score.">
    <meta property="og:type" content="website">
    
    <style>
        :root {
            --orange: #FF3300;
            --black: #000000;
            --dark: #0A0A0A;
            --grey: #161616;
            --border: #262626;
            --text: #FFFFFF;
            --dim: #888888;
            --font: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--black);
            color: var(--text);
            font-family: var(--font);
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* Slide / Card Container Framework */
        .story-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .story-card {
            min-height: 95vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid var(--border);
            background-color: var(--dark);
            margin: 20px 0 40px 0;
            padding: 35px 25px;
            position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--dim);
            letter-spacing: 1px;
            border-bottom: 1px dashed var(--border);
            padding-bottom: 15px;
        }
        .card-header span.highlight { color: var(--orange); font-weight: 600; }

        .card-body {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 25px 0;
        }

        .card-footer {
            border-top: 1px dashed var(--border);
            padding-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
        }

        /* Typography & Layout Accents */
        h1 { font-size: 2rem; font-weight: 800; text-transform: uppercase; line-height: 1.1; color: var(--text); }
        h1 span { color: var(--orange); }
        h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; color: var(--orange); margin-bottom: 15px; }
        p { font-size: 0.9rem; color: #DCDCDC; margin-bottom: 15px; }
        p.accent-text { color: var(--dim); font-size: 0.85rem; border-left: 2px solid var(--orange); padding-left: 12px; }

        /* Graphic Telemetry Blocks */
        .score-display {
            font-size: 4rem;
            font-weight: 800;
            color: var(--orange);
            line-height: 1;
            margin: 10px 0;
            letter-spacing: -2px;
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
        }
        .grid-item {
            background-color: var(--grey);
            border: 1px solid var(--border);
            padding: 12px;
            text-align: left;
        }
        .grid-label { font-size: 0.65rem; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; }
        .grid-value { font-size: 1.2rem; font-weight: 600; color: var(--text); margin-top: 4px; }

        /* Share Button Actions */
        .share-btn {
            background: none;
            border: 1px solid var(--orange);
            color: var(--orange);
            padding: 8px 16px;
            font-family: var(--font);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }
        .share-btn:hover {
            background-color: var(--orange);
            color: var(--black);
        }
    </style>
</head>
<body>

    <div class="story-container">

        <section class="story-card">
            <div class="card-header">
                <div>SYSTEM // TELEMETRY INITIALIZED</div>
                <div class="highlight">01/04</div>
            </div>
            <div class="card-body">
                <h2>System Identity Verified</h2>
                <h1 style="margin-bottom: 20px;">{{{currentName}}}</h1>
                <p>Structural alignment scanning finalized for architectural node <strong>{{{fullName}}}</strong>.</p>
                <p class="accent-text">Temporal Coordinate Record: {{{birthDate}}}<br>System Registry Footprint: {{{matrixId}}}</p>
            </div>
            <div class="card-footer">
                <span style="color: var(--dim);">SCROLL TO EXTRACT DATA</span>
                <span>↓↓</span>
            </div>
        </section>

        <section class="story-card">
