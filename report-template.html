<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLATH // System Core Telemetry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --orange: #FF3300;
            --black: #000000;
            --dark: #0A0A0A;
            --grey: #121212;
            --border: #222222;
            --text: #FFFFFF;
            --dim: #666666;
            --font: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--black);
            color: var(--text);
            font-family: var(--font);
            line-height: 1.6;
        }

        /* Generative Background Matrix Grid Background */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.15;
            pointer-events: none;
            z-index: 1;
        }

        .story-container {
            width: 100%;
            max-width: 100vw;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .story-card {
            width: 100%;
            max-width: 480px;
            min-height: 92vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid var(--border);
            background-color: var(--dark);
            margin: 25px 0;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            position: relative;
        }

        /* Responsive Desktop Layout: Flows cards edge-to-edge horizontally */
        @media (min-width: 1024px) {
            .story-container {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 25px;
                padding: 50px;
            }
